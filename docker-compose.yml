version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: postgres_dataflow360
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dataflow360
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_dataflow360
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@dataflow360.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    restart: always  # ✅ Ajouté
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SERVER_ID: 1  # ✅ Ajouté
    ports:
      - "2181:2181"
    volumes:  # ✅ Ajouté pour persistence
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_logs:/var/lib/zookeeper/log

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    restart: always  # ✅ Ajouté
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'  # ✅ Ajouté
    volumes:  # ✅ Ajouté pour persistence
      - kafka_data:/var/lib/kafka/data

volumes:
  postgres_data:
  zookeeper_data:  # ✅ Ajouté
  zookeeper_logs:  # ✅ Ajouté
  kafka_data:      # ✅ Ajouté